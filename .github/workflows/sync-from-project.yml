name: Kanban Board → Sync Labels on Issues

# Runs every 5 minutes. Queries the GitHub Project for all items,
# compares each item's Status field to the issue's current lifecycle label,
# and updates the label if they differ.
# This keeps the CAP Portal Kanban in sync when cards are moved directly
# on the GitHub Projects board.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync project status → issue labels
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.KANBAN_PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const COLUMN_MAP = {
              'Draft':        'draft',
              'Submitted':    'submitted',
              'Review':       'review',
              'Consultation': 'consultation',
              'Revision':     'revision',
              'Finalizing':   'finalizing',
              'Ready':        'ready',
              'On-Chain':     'onchain',
              'Done':         'done',
              'Withdrawn':    'withdrawn',
            };

            const LIFECYCLE_LABELS = Object.values(COLUMN_MAP);
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const projectNum = parseInt(process.env.PROJECT_NUMBER);

            if (!projectNum) {
              core.setFailed('KANBAN_PROJECT_NUMBER variable is not set.');
              return;
            }

            // Fetch all project items with their Status and linked issue
            let project;
            for (const ownerType of ['user', 'organization']) {
              try {
                const data = await github.graphql(`
                  query($login: String!, $number: Int!) {
                    ${ownerType}(login: $login) {
                      projectV2(number: $number) {
                        items(first: 100) {
                          nodes {
                            content {
                              ... on Issue {
                                number
                                labels(first: 20) {
                                  nodes { name }
                                }
                              }
                            }
                            fieldValues(first: 20) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  name
                                  field { ... on ProjectV2SingleSelectField { name } }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `, { login: owner, number: projectNum });
                project = data[ownerType].projectV2;
                break;
              } catch { /* try next */ }
            }

            if (!project) {
              core.setFailed(`Project #${projectNum} not found for ${owner}.`);
              return;
            }

            let synced = 0;

            for (const item of project.items.nodes) {
              if (!item.content?.number) continue;  // Skip non-issues

              const issueNumber = item.content.number;
              const currentLabels = item.content.labels.nodes.map(l => l.name);

              // Find the project Status value
              const statusField = item.fieldValues.nodes.find(
                fv => fv.field?.name === 'Status'
              );
              if (!statusField?.name) continue;

              const targetLabel = COLUMN_MAP[statusField.name];
              if (!targetLabel) continue;

              // Check if label already matches
              const currentLifecycle = currentLabels.find(l => LIFECYCLE_LABELS.includes(l));
              if (currentLifecycle === targetLabel) continue;

              console.log(`Issue #${issueNumber}: board="${statusField.name}", label="${currentLifecycle || 'none'}" → syncing to "${targetLabel}"`);

              // Remove old lifecycle labels
              for (const label of currentLabels) {
                if (LIFECYCLE_LABELS.includes(label)) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner, repo, issue_number: issueNumber, name: label
                    });
                  } catch {}
                }
              }

              // Add the correct label
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNumber, labels: [targetLabel]
              });

              synced++;
              console.log(`✅ Issue #${issueNumber} → "${targetLabel}"`);
            }

            console.log(`Sync complete. ${synced} issue(s) updated.`);
