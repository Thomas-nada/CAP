name: CAP – Constitutional Amendment Proposal
description: Submit a new Constitutional Amendment Proposal for review.
title: "[CAP] "
labels: ["CAP", "draft"]

body:
  - type: markdown
    attributes:
      value: |
        ## Constitutional Amendment Proposal (CAP)
        Complete all required fields. Your proposal will start in **Draft** status.
        Editors will move it through the review stages once submitted.

  - type: dropdown
    id: category
    attributes:
      label: Proposal Category
      description: Choose the category that best describes the nature of this change.
      options:
        - Procedural – Governance procedures
        - Substantive – Constitutional substance
        - Technical – Technical or protocol changes
        - Interpretive – Clarifications of existing text
        - Editorial – Formatting or typo fixes
        - Other
    validations:
      required: true

  - type: textarea
    id: abstract
    attributes:
      label: Abstract
      description: A concise summary of what this proposal does (1–3 sentences).
      placeholder: This proposal amends Article II to...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this change necessary? What problem does it solve?
      placeholder: The current text creates ambiguity around...
    validations:
      required: true

  - type: textarea
    id: analysis
    attributes:
      label: Analysis
      description: Detailed examination of the proposed change, trade-offs, and alternatives considered.
      placeholder: |
        The proposed change would affect...
        Alternative approaches considered include...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact Assessment
      description: What are the expected consequences if this proposal is adopted?
      placeholder: |
        Short-term: ...
        Long-term: ...
        Stakeholders affected: ...
    validations:
      required: true

  - type: textarea
    id: revisions
    attributes:
      label: Proposed Revisions
      description: |
        List every specific text change. Use the format below for each revision.
      placeholder: |
        **Section:** Article I, Section 3
        **Current text:**
        The Committee shall meet quarterly.

        **Proposed text:**
        The Committee shall meet monthly, with quorum defined as a majority of appointed members.

        ---

        **Section:** Article II, Section 1
        **Current text:** ...
        **Proposed text:** ...
    validations:
      required: true

  - type: input
    id: coauthors
    attributes:
      label: Co-Authors
      description: GitHub usernames of co-authors (optional), comma-separated.
      placeholder: "@username1, @username2"
